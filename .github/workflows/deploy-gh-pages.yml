# Déploie le build web statique sur la branche gh-pages (GitHub Pages).
# Prérequis : Settings → Pages → Source = branche gh-pages, dossier / (root).
name: Deploy web to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Export Expo web
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx expo export -p web
      - name: Publish dist to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
